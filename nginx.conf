server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly (build output isn't pre-gzipped).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # Hashed build assets (Vite emits content-hashed filenames) -> cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path serves the app shell so client-side
    # routing works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the shell itself, or clients get stuck on a stale bundle.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Baseline hardening headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
